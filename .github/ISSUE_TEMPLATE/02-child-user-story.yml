name: Child user story
description: A smaller user story or implementation slice linked to a main user story.
title: "[Child story]: "
labels: ["user story", "child story"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for a smaller story that belongs under a larger main user story.

        A child story should be small enough to discuss, estimate, implement and review without becoming vague.

  - type: input
    id: parent-story
    attributes:
      label: Parent story
      description: Link the main user story this child story belongs to, if known.
      placeholder: "#123"
    validations:
      required: false

  - type: textarea
    id: user-story
    attributes:
      label: Child user story
      description: Describe this smaller story from the user's point of view.
      placeholder: As a [type of user], I want [goal] so that [benefit].
      value: |
        As a ...
        I want ...
        so that ...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope of this child story
      description: What is included in this child story?
      placeholder: |
        This story includes:
        - ...

        This story does not include:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the conditions that must be met for this child story to be considered complete.
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: user-area
    attributes:
      label: User area
      description: Which part of the application does this mainly concern?
      options:
        - Public website
        - Logged-in administration
        - Content management
        - Events
        - Campaigns / initiatives
        - Resources
        - Users / roles / permissions
        - Forms / enquiries
        - Privacy / data protection
        - Other / not yet clear
    validations:
      required: true

  - type: dropdown
    id: technical-impact
    attributes:
      label: Likely technical impact
      description: Initial estimate only. This can be corrected during planning.
      options:
        - Frontend only
        - Backend only
        - Frontend and backend
        - Content/configuration only
        - Design/content dependency
        - Not yet clear
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / related issues
      description: Link related issues, decisions, design work or content dependencies if known.
      placeholder: |
        Depends on:
        Related to:
        External decision needed:
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Anything else useful for understanding this child story.
    validations:
      required: false
      
